# File generated by `go run ./internal/cmd/ghgen`; DO NOT EDIT.

name: ios
on:
  push:
    branches:
      - "release/**"
      - "fullbuild"
      - "iosbuild"
    tags:
      - "v*"
  schedule:
    - cron: "17 1 * * *"

jobs:
  build_ios_mobile:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get GOVERSION content
        id: goversion
        run: echo "version=$(cat GOVERSION)" >> "$GITHUB_OUTPUT"
      - uses: magnetikonline/action-golang-cache@v4
        with:
          go-version: "${{ steps.goversion.outputs.version }}"
          cache-key-suffix: "-ios-${{ steps.goversion.outputs.version }}"

      # ./internal/cmd/buildtool needs coreutils for sha256 plus GNU build tools
      - run: brew install autoconf automake coreutils libtool

      - run: make EXPECTED_XCODE_VERSION=15.4 ios

      - uses: actions/upload-artifact@v4
        with:
          name: libcrypto.xcframework.zip
          path: ./MOBILE/ios/libcrypto.xcframework.zip

      - uses: actions/upload-artifact@v4
        with:
          name: libcrypto.podspec
          path: ./MOBILE/ios/libcrypto.podspec

      - uses: actions/upload-artifact@v4
        with:
          name: libevent.xcframework.zip
          path: ./MOBILE/ios/libevent.xcframework.zip

      - uses: actions/upload-artifact@v4
        with:
          name: libevent.podspec
          path: ./MOBILE/ios/libevent.podspec

      - uses: actions/upload-artifact@v4
        with:
          name: libssl.xcframework.zip
          path: ./MOBILE/ios/libssl.xcframework.zip

      - uses: actions/upload-artifact@v4
        with:
          name: libssl.podspec
          path: ./MOBILE/ios/libssl.podspec

      - uses: actions/upload-artifact@v4
        with:
          name: libtor.xcframework.zip
          path: ./MOBILE/ios/libtor.xcframework.zip

      - uses: actions/upload-artifact@v4
        with:
          name: libtor.podspec
          path: ./MOBILE/ios/libtor.podspec

      - uses: actions/upload-artifact@v4
        with:
          name: libz.xcframework.zip
          path: ./MOBILE/ios/libz.xcframework.zip

      - uses: actions/upload-artifact@v4
        with:
          name: libz.podspec
          path: ./MOBILE/ios/libz.podspec

      - uses: actions/upload-artifact@v4
        with:
          name: oonimkall.xcframework.zip
          path: ./MOBILE/ios/oonimkall.xcframework.zip

      - uses: actions/upload-artifact@v4
        with:
          name: oonimkall.podspec
          path: ./MOBILE/ios/oonimkall.podspec

  publish_ios_mobile:
    runs-on: ubuntu-22.04
    needs: build_ios_mobile
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: libcrypto.xcframework.zip

      - uses: actions/download-artifact@v4
        with:
          name: libcrypto.podspec

      - uses: actions/download-artifact@v4
        with:
          name: libevent.xcframework.zip

      - uses: actions/download-artifact@v4
        with:
          name: libevent.podspec

      - uses: actions/download-artifact@v4
        with:
          name: libssl.xcframework.zip

      - uses: actions/download-artifact@v4
        with:
          name: libssl.podspec

      - uses: actions/download-artifact@v4
        with:
          name: libtor.xcframework.zip

      - uses: actions/download-artifact@v4
        with:
          name: libtor.podspec

      - uses: actions/download-artifact@v4
        with:
          name: libz.xcframework.zip

      - uses: actions/download-artifact@v4
        with:
          name: libz.podspec

      - uses: actions/download-artifact@v4
        with:
          name: oonimkall.xcframework.zip

      - uses: actions/download-artifact@v4
        with:
          name: oonimkall.podspec

      - run: ./script/ghpublish.bash libcrypto.xcframework.zip libcrypto.podspec libevent.xcframework.zip libevent.podspec libssl.xcframework.zip libssl.podspec libtor.xcframework.zip libtor.podspec libz.xcframework.zip libz.podspec oonimkall.xcframework.zip oonimkall.podspec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_ios_maven:
    runs-on: ubuntu-22.04
    needs: build_ios_mobile
    if: github.event_name != 'schedule'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - lib: libcrypto
            description: "OpenSSL libcrypto compiled for OONI Probe iOS"
            license_name: "Apache License 2.0"
            license_url: "https://www.apache.org/licenses/LICENSE-2.0"
          - lib: libevent
            description: "Libevent compiled for OONI Probe iOS"
            license_name: "The 3-Clause BSD License"
            license_url: "https://opensource.org/licenses/BSD-3-Clause"
          - lib: libssl
            description: "OpenSSL libssl compiled for OONI Probe iOS"
            license_name: "Apache License 2.0"
            license_url: "https://www.apache.org/licenses/LICENSE-2.0"
          - lib: libtor
            description: "tor compiled for OONI Probe iOS"
            license_name: "The 3-Clause BSD License"
            license_url: "https://opensource.org/licenses/BSD-3-Clause"
          - lib: libz
            description: "zlib compiled for OONI Probe iOS"
            license_name: "The zlib License"
            license_url: "https://opensource.org/licenses/Zlib"
          - lib: oonimkall
            description: "OONI Probe Library for iOS"
            license_name: "The 3-Clause BSD License"
            license_url: "https://opensource.org/licenses/BSD-3-Clause"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Download ${{ matrix.lib }} xcframework
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.lib }}.xcframework.zip
          path: maven/ios

      - name: Download ${{ matrix.lib }} podspec
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.lib }}.podspec
          path: maven/ios

      - name: Generate the pom for ${{ matrix.lib }}
        working-directory: maven/ios
        run: |
          sed -e "s|@ARTIFACT_ID@|${{ matrix.lib }}-ios|g" \
              -e "s|@LIB@|${{ matrix.lib }}|g" \
              -e "s|@DESCRIPTION@|${{ matrix.description }}|g" \
              -e "s|@LICENSE_NAME@|${{ matrix.license_name }}|g" \
              -e "s|@LICENSE_URL@|${{ matrix.license_url }}|g" \
              template.pom >pom.xml

      - name: Set Project Version
        working-directory: maven/ios
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
            VERSION="0.0.0-${SHORT_SHA}"
          fi
          echo "Generated version: $VERSION"
          mvn versions:set -DnewVersion=${VERSION} -DremoveSnapshot=true
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        working-directory: maven/ios
        run: |
          mvn clean deploy --batch-mode -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
