# File generated by `go run ./internal/cmd/ghgen`; DO NOT EDIT.

name: linux
on:
  push:
    branches:
      - "release/**"
      - "fullbuild"
      - "linuxbuild"
    tags:
      - "v*"
  schedule:
    - cron: "17 1 * * *"

jobs:
  build_linux_cli:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "386"
            rust-target: i686-unknown-linux-musl
            musl-prefix: i686-linux-musl
          - arch: amd64
            rust-target: x86_64-unknown-linux-musl
            musl-prefix: x86_64-linux-musl
          - arch: armv6
            rust-target: arm-unknown-linux-musleabihf
            musl-prefix: arm-linux-musleabihf
          - arch: armv7
            rust-target: armv7-unknown-linux-musleabihf
            musl-prefix: armv7l-linux-musleabihf
          - arch: arm64
            rust-target: aarch64-unknown-linux-musl
            musl-prefix: aarch64-linux-musl
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get GOVERSION content
        id: goversion
        run: echo "version=$(cat GOVERSION)" >> "$GITHUB_OUTPUT"
      - uses: magnetikonline/action-golang-cache@v4
        with:
          go-version: "${{ steps.goversion.outputs.version }}"
          cache-key-suffix: "-linux-cross-${{ matrix.arch }}-${{ steps.goversion.outputs.version }}"

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache musl cross toolchain
        uses: actions/cache@v4
        with:
          path: ~/x-tools/${{ matrix.musl-prefix }}-cross
          key: musl-cross-${{ matrix.musl-prefix }}

      - name: Install musl cross toolchain
        run: |
          root="$HOME/x-tools/${{ matrix.musl-prefix }}-cross"
          if [ ! -x "$root/bin/${{ matrix.musl-prefix }}-gcc" ]; then
            mkdir -p "$HOME/x-tools"
            curl -fsSL "https://musl.cc.timfish.dev/${{ matrix.musl-prefix }}-cross.tgz" | tar -xz -C "$HOME/x-tools"
          fi
          echo "$root/bin" >> "$GITHUB_PATH"
          echo "BINDGEN_EXTRA_CLANG_ARGS=--sysroot=$root/${{ matrix.musl-prefix }} --target=${{ matrix.rust-target }}" >> "$GITHUB_ENV"

      - name: Configure cargo linker
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.${{ matrix.rust-target }}]
          linker = "${{ matrix.musl-prefix }}-gcc"
          EOF

      - name: Cross build the CLI
        run: make CLI/linux-static-${{ matrix.arch }}
        env:
          USERAUTH_FROM_SOURCE: "1"
          USERAUTH_RUST_TARGET: ${{ matrix.rust-target }}
          CC: ${{ matrix.musl-prefix }}-gcc
          CXX: ${{ matrix.musl-prefix }}-g++

      - uses: actions/upload-artifact@v4
        with:
          name: ooniprobe-linux-${{ matrix.arch }}
          path: ./CLI/ooniprobe-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: miniooni-linux-${{ matrix.arch }}
          path: ./CLI/miniooni-linux-${{ matrix.arch }}

      # Only the amd64 binary runs on this x86_64 runner, so we E2E test just that
      # one. A failure here fails the amd64 leg and, since publish needs the whole
      # build matrix, holds back the entire release.
      - name: Install tor for the E2E tests
        if: matrix.arch == 'amd64'
        run: sudo apt-get update -q && sudo apt-get install -y tor

      - name: Run the E2E tests
        if: matrix.arch == 'amd64'
        shell: bash
        run: |
          chmod +x CLI/ooniprobe-linux-amd64 CLI/miniooni-linux-amd64
          ./E2E/ooniprobe.bash ./CLI/ooniprobe-linux-amd64
          ./E2E/miniooni.bash ./CLI/miniooni-linux-amd64

  publish_linux_cli:
    runs-on: ubuntu-22.04
    needs: build_linux_cli
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: ["386", amd64, armv6, armv7, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: ooniprobe-linux-${{ matrix.arch }}

      - uses: actions/download-artifact@v4
        with:
          name: miniooni-linux-${{ matrix.arch }}

      - run: ./script/ghpublish.bash ooniprobe-linux-${{ matrix.arch }} miniooni-linux-${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
